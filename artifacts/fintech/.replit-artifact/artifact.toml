kind = "web"
previewPath = "/"
title = "FinTech Dashboard"
version = "1.0.0"
id = "artifacts/fintech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24328
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fintech run dev"

[services.env]
PORT = "24328"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fintech", "run", "build"]
publicDir = "artifacts/fintech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
