packages:
  "recharts": "For rendering financial charts on the dashboard and savings pages"
  "framer-motion": "For smooth page transitions and micro-interactions"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation integration with forms"
  "date-fns": "For formatting and parsing dates cleanly"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"
  "zod": "For defining local form validation schemas"

images:
  - path: "artifacts/fintech/public/images/hero-bg.png"
    description: "Dark, professional abstract geometric network pattern in deep blue and teal colors, suitable for a premium fintech app background"
    aspect_ratio: "16:9"
  - path: "artifacts/fintech/public/images/logo.png"
    description: "Minimalist modern abstract fintech logo mark in glowing cyan and electric blue on transparent background"
    aspect_ratio: "1:1"

notes:
  - Assuming generated Orval hooks from @workspace/api-client-react handle their own base URLs correctly.
  - App is forced into dark mode for a premium professional FinTech feel.
  - Using Indian Rupees (INR) for all currency formatting.
