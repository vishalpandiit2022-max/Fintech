<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FinTech Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">💹</div>
      <span class="logo-text">FinTech</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard"  class="nav-item {% if active == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">🏠</span><span>Dashboard</span>
      </a>
      <a href="/expenses"   class="nav-item {% if active == 'expenses' %}active{% endif %}">
        <span class="nav-icon">💳</span><span>Expenses</span>
      </a>
      <a href="/savings"    class="nav-item {% if active == 'savings' %}active{% endif %}">
        <span class="nav-icon">🎯</span><span>Savings Goals</span>
      </a>
      <a href="/advisory"   class="nav-item {% if active == 'advisory' %}active{% endif %}">
        <span class="nav-icon">🤖</span><span>Investment Advisory</span>
      </a>
      <a href="/profile"    class="nav-item {% if active == 'profile' %}active{% endif %}">
        <span class="nav-icon">👤</span><span>Profile</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="logout-btn" onclick="doLogout()">
        <span>🚪</span><span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>{% block page_title %}{% endblock %}</h1>
      </div>
      <div class="topbar-right">
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" placeholder="Search..." />
        </div>
        <div class="user-avatar" id="userAvatar" title="Profile">?</div>
      </div>
    </header>
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>

<script>
async function doLogout() {
  await fetch('/logout', { method: 'POST' });
  window.location.href = '/login';
}

async function loadUserAvatar() {
  try {
    const res = await fetch('/user', { headers: { 'Accept': 'application/json' } });
    if (res.ok) {
      const u = await res.json();
      const el = document.getElementById('userAvatar');
      if (el) el.textContent = u.name.charAt(0).toUpperCase();
    } else {
      window.location.href = '/login';
    }
  } catch {}
}

loadUserAvatar();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
