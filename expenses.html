<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses – FinTech</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">💹</div>
      <span class="logo-text">FinTech</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
      <a href="expenses.html"  class="nav-item"><span class="nav-icon">💳</span><span>Expenses</span></a>
      <a href="savings.html"   class="nav-item"><span class="nav-icon">🎯</span><span>Savings Goals</span></a>
      <a href="advisory.html"  class="nav-item"><span class="nav-icon">🤖</span><span>Investment Advisory</span></a>
      <a href="profile.html"   class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>
    <div class="sidebar-bottom">
      <button class="logout-btn" onclick="doLogout()"><span>🚪</span><span>Logout</span></button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1>Expense Tracker</h1></div>
      <div class="topbar-right">
        <div class="search-bar"><span>🔍</span><input type="text" placeholder="Search..." /></div>
        <div class="user-avatar" id="userAvatar">?</div>
      </div>
    </header>
    <main class="page-content">

      <div class="page-header">
        <div>
          <h2>All Expenses</h2>
          <p>Track and manage every transaction</p>
        </div>
        <button class="btn btn-primary btn-sm btn-inline" onclick="toggleForm()">+ Add Expense</button>
      </div>

      <div class="add-form-card" id="addFormCard" style="display:none">
        <h3 class="section-title">New Expense</h3>
        <div class="alert alert-error" id="formError"></div>
        <form id="addExpenseForm">
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="expDesc" placeholder="e.g. Grocery shopping, Electricity bill..." required />
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label>Category</label>
              <select id="expCat" required>
                <option value="">Select category</option>
                <option value="Food">🍽️ Food</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Bills">📋 Bills</option>
                <option value="Entertainment">🎮 Entertainment</option>
                <option value="Other">📦 Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Amount (₹)</label>
              <input type="number" id="expAmount" placeholder="0" min="1" step="0.01" required />
            </div>
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="expDate" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-sm btn-inline">Save Expense</button>
        </form>
      </div>

      <div class="card" style="margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between">
        <span class="text-muted text-sm">Total Expenses</span>
        <span class="font-bold text-red" id="totalAmount" style="font-size:1.3rem">₹0.00</span>
      </div>

      <div class="card">
        <div class="expenses-list" id="expensesList">
          <div class="loading">Loading expenses...</div>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="js/expenses.js"></script>
</body>
</html>
